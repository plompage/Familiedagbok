<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Familiedagbok</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Caveat:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://apis.google.com/js/api.js" defer></script>
  <script src="https://accounts.google.com/gsi/client" defer></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f5ede0;
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(210,170,120,0.18) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 90%, rgba(180,130,90,0.13) 0%, transparent 60%);
      font-family: 'Lora', serif;
    }

    /* LOGIN */
    #login-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }

    .login-book { font-size: 4rem; margin-bottom: 24px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

    .login-title { font-family: 'Caveat', cursive; font-size: 3.2rem; color: #5c3d1e; margin-bottom: 6px; }
    .login-subtitle { font-style: italic; color: #a07850; font-size: 0.9rem; margin-bottom: 44px; }

    .login-btn {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 28px;
      background: #fffdf7; border: 1.5px solid #c8915a; border-radius: 30px;
      font-family: 'Lora', serif; font-size: 1rem; color: #5c3d1e;
      cursor: pointer; box-shadow: 0 4px 16px rgba(100,60,20,0.12);
      transition: all 0.2s;
    }
    .login-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(100,60,20,0.18); }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .login-note { margin-top: 18px; font-size: 0.78rem; color: #b09070; font-style: italic; max-width: 280px; }

    .error-box {
      background: #fff5f0; border: 1px solid #e8b89a; border-radius: 8px;
      padding: 14px 18px; margin: 0 16px 20px; font-size: 0.85rem; color: #7a4020;
      max-width: 500px;
    }

    /* APP */
    #app-screen { display: none; }

    .header { text-align: center; padding: 32px 20px 16px; }
    .header-title { font-family: 'Caveat', cursive; font-size: 2.8rem; color: #5c3d1e; line-height: 1; }
    .header-subtitle { font-style: italic; color: #a07850; font-size: 0.85rem; margin-top: 5px; }
    .header-divider { width: 120px; height: 2px; background: linear-gradient(90deg, transparent, #c8915a, transparent); margin: 12px auto 0; }

    .user-bar { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px 20px 0; font-size: 0.82rem; color: #a07850; flex-wrap: wrap; }
    .user-name { font-family: 'Caveat', cursive; font-size: 1.05rem; color: #7a5230; background: rgba(200,145,90,0.15); padding: 3px 12px; border-radius: 12px; border: 1px solid rgba(200,145,90,0.3); }
    .signout-btn { background: transparent; border: 1px solid #c8a882; border-radius: 12px; padding: 3px 10px; font-family: 'Lora', serif; font-size: 0.75rem; color: #a07850; cursor: pointer; transition: all 0.15s; }
    .signout-btn:hover { background: rgba(200,145,90,0.1); }

    .sync-bar { text-align: center; font-size: 0.75rem; color: #b09070; font-style: italic; padding: 6px 0 0; }
    .sync-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #a8c890; margin-right: 5px; vertical-align: middle; }
    .sync-dot.syncing { background: #c8b870; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* NEW ENTRY */
    .new-entry-wrapper { max-width: 640px; margin: 22px auto 0; padding: 0 16px; }

    .new-entry-card {
      background: #fffdf7; border-radius: 4px;
      box-shadow: 0 2px 12px rgba(100,60,20,0.1), 0 0 0 1px rgba(180,130,80,0.12);
      padding: 22px 26px 18px; position: relative; overflow: hidden;
    }
    .new-entry-card::before { content:''; position:absolute; left:50px; top:0; bottom:0; width:1px; background:rgba(220,100,80,0.22); z-index:0; }
    .new-entry-card::after { content:''; position:absolute; inset:0; background-image:repeating-linear-gradient(transparent,transparent 27px,rgba(180,150,110,0.13) 27px,rgba(180,150,110,0.13) 28px); pointer-events:none; z-index:0; }

    .new-entry-label { font-family:'Caveat',cursive; font-size:1.15rem; color:#a07040; margin-bottom:10px; padding-left:44px; position:relative; z-index:1; }

    #entry-textarea {
      width:100%; min-height:120px; background:transparent; border:none; outline:none; resize:none;
      font-family:'Lora',serif; font-size:0.95rem; color:#3d2b14; line-height:28px;
      padding-left:44px; position:relative; z-index:1;
    }
    #entry-textarea::placeholder { color:#c4a882; }

    .entry-actions { display:flex; align-items:center; justify-content:space-between; margin-top:12px; padding-left:44px; position:relative; z-index:1; }

    .photo-label { display:flex; align-items:center; gap:6px; font-size:0.8rem; color:#a07850; cursor:pointer; padding:6px 12px; border-radius:16px; border:1px dashed #c8a87a; transition:all 0.2s; }
    .photo-label:hover { background:rgba(200,168,122,0.1); }
    #photo-count { background:#c8915a; color:white; border-radius:10px; font-size:0.68rem; padding:1px 6px; font-family:'Caveat',cursive; display:none; }

    .submit-btn { padding:8px 20px; background:#7a5230; color:#f5ede0; border:none; border-radius:20px; font-family:'Lora',serif; font-size:0.85rem; cursor:pointer; transition:all 0.2s; box-shadow:0 2px 6px rgba(100,60,20,0.2); }
    .submit-btn:hover { background:#5c3d1e; transform:translateY(-1px); }
    .submit-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }

    #photo-previews { display:flex; flex-wrap:wrap; gap:8px; padding-left:44px; margin-top:10px; position:relative; z-index:1; }
    .photo-thumb-wrap { position:relative; }
    .photo-thumb { width:60px; height:60px; object-fit:cover; border-radius:4px; border:2px solid #e8d5b8; box-shadow:2px 2px 5px rgba(0,0,0,0.1); }
    .photo-remove { position:absolute; top:-6px; right:-6px; width:18px; height:18px; background:#7a5230; color:white; border-radius:50%; border:none; font-size:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; }

    /* ENTRIES */
    .entries-section { max-width:640px; margin:28px auto 60px; padding:0 16px; }
    .entries-header { font-family:'Caveat',cursive; font-size:1.35rem; color:#a07040; text-align:center; margin-bottom:18px; }

    .entry-card { background:#fffdf7; border-radius:4px; box-shadow:0 2px 10px rgba(100,60,20,0.08),0 0 0 1px rgba(180,130,80,0.1); margin-bottom:18px; overflow:hidden; animation:fadeIn 0.4s ease; position:relative; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    .entry-body { padding:16px 20px 16px 56px; position:relative; }
    .entry-body::before { content:''; position:absolute; left:44px; top:0; bottom:0; width:1px; background:rgba(220,100,80,0.2); }
    .entry-body::after { content:''; position:absolute; inset:0; background-image:repeating-linear-gradient(transparent,transparent 27px,rgba(180,150,110,0.1) 27px,rgba(180,150,110,0.1) 28px); pointer-events:none; }

    .entry-meta { display:flex; align-items:center; gap:8px; margin-bottom:7px; position:relative; z-index:1; flex-wrap:wrap; }
    .entry-author-badge { font-family:'Caveat',cursive; font-size:0.95rem; font-weight:600; color:#7a5230; background:rgba(200,145,90,0.15); padding:2px 10px; border-radius:12px; border:1px solid rgba(200,145,90,0.3); }
    .entry-date { font-size:0.75rem; color:#b09070; font-style:italic; }
    .entry-text { font-size:0.93rem; color:#3d2b14; line-height:28px; white-space:pre-wrap; position:relative; z-index:1; }

    .entry-photos { display:flex; flex-wrap:wrap; gap:8px; padding:8px 20px 14px 56px; }
    .entry-photo { width:85px; height:85px; object-fit:cover; border-radius:4px; border:2px solid #e8d5b8; box-shadow:2px 3px 8px rgba(0,0,0,0.12); cursor:pointer; transition:transform 0.15s; }
    .entry-photo:hover { transform:scale(1.05) rotate(1deg); }

    .entry-delete { position:absolute; top:10px; right:10px; background:transparent; border:none; color:#c8a882; font-size:0.78rem; cursor:pointer; opacity:0; transition:opacity 0.2s; z-index:2; padding:4px 6px; }
    .entry-card:hover .entry-delete { opacity:1; }

    /* LIGHTBOX */
    #lightbox { display:none; position:fixed; inset:0; background:rgba(30,15,5,0.88); z-index:10000; align-items:center; justify-content:center; cursor:pointer; }
    #lightbox.active { display:flex; }
    #lightbox img { max-width:90vw; max-height:85vh; border-radius:4px; box-shadow:0 8px 40px rgba(0,0,0,0.5); cursor:default; }
    #lightbox-close { position:absolute; top:20px; right:24px; background:transparent; border:none; color:#e8d5b8; font-size:2rem; cursor:pointer; }

    /* TOAST */
    #toast { display:none; position:fixed; bottom:28px; left:50%; transform:translateX(-50%); background:#5c3d1e; color:#f5ede0; padding:10px 22px; border-radius:20px; font-size:0.86rem; z-index:10001; white-space:nowrap; box-shadow:0 4px 16px rgba(0,0,0,0.2); }

    .loading { text-align:center; padding:40px; color:#b09070; font-style:italic; }
    .empty-state { text-align:center; padding:40px 20px; color:#b09070; font-style:italic; }
    .empty-icon { font-size:2.5rem; display:block; margin-bottom:12px; opacity:0.5; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-book">📖</div>
  <div class="login-title">Familiedagbok</div>
  <div class="login-subtitle">Våre minner, side for side</div>
  <div id="login-error" class="error-box" style="display:none"></div>
  <button class="login-btn" id="login-btn" onclick="handleLogin()">
    <svg width="20" height="20" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Logg inn med Google
  </button>
  <div class="login-note">Innleggene lagres i en mappe kalt «Familiedagbok» på din Google Drive.</div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="header">
    <div class="header-title">Familiedagbok</div>
    <div class="header-subtitle">Våre minner, side for side</div>
    <div class="header-divider"></div>
  </div>

  <div class="user-bar">
    <span>Innlogget som</span>
    <span class="user-name" id="user-name-display">✍️</span>
    <button class="signout-btn" onclick="handleSignOut()">Logg ut</button>
  </div>

  <div class="sync-bar">
    <span class="sync-dot" id="sync-dot"></span>
    <span id="sync-label">Klar</span>
  </div>

  <div id="app-error" class="error-box" style="display:none;margin:12px auto;max-width:608px;"></div>

  <div class="new-entry-wrapper">
    <div class="new-entry-card">
      <div class="new-entry-label">Skriv dagens tanker...</div>
      <textarea id="entry-textarea" placeholder="Det skjedde noe fint i dag..."></textarea>
      <div id="photo-previews"></div>
      <div class="entry-actions">
        <label class="photo-label">
          📷 Legg til bilder
          <span id="photo-count"></span>
          <input type="file" id="photo-input" accept="image/*" multiple style="display:none" onchange="handlePhotos(this)" />
        </label>
        <button class="submit-btn" id="submit-btn" onclick="handleSubmit()">Skriv inn ✦</button>
      </div>
    </div>
  </div>

  <div class="entries-section">
    <div class="entries-header">— Våre innlegg —</div>
    <div id="entries-list"><div class="loading">Laster dagboken fra Drive...</div></div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="" onclick="event.stopPropagation()" />
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
  // ---- CONFIG ----
  const CLIENT_ID = "885648821523-iadmhinq9a8lfj7249cqs6aapqej6pap.apps.googleusercontent.com";
  const SCOPES = "https://www.googleapis.com/auth/drive.file";
  const FOLDER_NAME = "Familiedagbok";
  const ENTRIES_FILE = "dagbok-entries.json";

  // ---- STATE ----
  let accessToken = null;
  let userName = "";
  let folderId = null;
  let fileId = null;
  let entries = [];
  let pendingPhotos = [];
  let syncInterval = null;

  // ---- UTILS ----
  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.style.display = "block";
    setTimeout(() => t.style.display = "none", 3000);
  }

  function setSyncing(active, label) {
    const dot = document.getElementById("sync-dot");
    const lbl = document.getElementById("sync-label");
    dot.className = "sync-dot" + (active ? " syncing" : "");
    if (label) lbl.textContent = label;
  }

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString("nb-NO", {
      weekday: "long", year: "numeric", month: "long", day: "numeric",
      hour: "2-digit", minute: "2-digit"
    });
  }

  function resizeImage(dataUrl, maxPx = 1200) {
    return new Promise(res => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxPx / Math.max(img.width, img.height));
        const canvas = document.createElement("canvas");
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
        res(canvas.toDataURL("image/jpeg", 0.78));
      };
      img.src = dataUrl;
    });
  }

  // ---- GOOGLE AUTH ----
  let tokenClient = null;

  window.addEventListener("load", () => {
    // Wait for GIS to load
    const waitGis = setInterval(() => {
      if (window.google?.accounts?.oauth2) {
        clearInterval(waitGis);
        tokenClient = google.accounts.oauth2.initTokenClient({
          client_id: CLIENT_ID,
          scope: SCOPES,
          callback: async (resp) => {
            if (resp.error) {
              showLoginError("Innlogging feilet: " + resp.error);
              document.getElementById("login-btn").disabled = false;
              document.getElementById("login-btn").textContent = "Logg inn med Google";
              return;
            }
            accessToken = resp.access_token;
            await afterLogin();
          }
        });
      }
    }, 200);
  });

  function handleLogin() {
    const btn = document.getElementById("login-btn");
    btn.disabled = true;
    btn.textContent = "Logger inn...";
    document.getElementById("login-error").style.display = "none";
    tokenClient.requestAccessToken({ prompt: "consent" });
  }

  function showLoginError(msg) {
    const el = document.getElementById("login-error");
    el.textContent = "⚠️ " + msg;
    el.style.display = "block";
  }

  async function afterLogin() {
    // Get user info
    try {
      const r = await fetch("https://www.googleapis.com/oauth2/v3/userinfo", {
        headers: { Authorization: "Bearer " + accessToken }
      });
      const d = await r.json();
      userName = d.given_name || d.email || "Deg";
    } catch { userName = "Deg"; }

    document.getElementById("user-name-display").textContent = "✍️ " + userName;
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app-screen").style.display = "block";

    await loadDriveData();
    syncInterval = setInterval(() => loadDriveData(true), 30000);
  }

  function handleSignOut() {
    if (accessToken) google.accounts.oauth2.revoke(accessToken);
    accessToken = null; folderId = null; fileId = null; entries = [];
    clearInterval(syncInterval);
    document.getElementById("app-screen").style.display = "none";
    document.getElementById("login-screen").style.display = "flex";
    const btn = document.getElementById("login-btn");
    btn.disabled = false;
    btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Logg inn med Google`;
  }

  // ---- DRIVE HELPERS ----
  async function driveReq(method, path, params, body) {
    const q = params ? "?" + new URLSearchParams(params) : "";
    const res = await fetch("https://www.googleapis.com/drive/v3" + path + q, {
      method,
      headers: { Authorization: "Bearer " + accessToken, "Content-Type": "application/json" },
      body: body ? JSON.stringify(body) : undefined
    });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  }

  async function getOrCreateFolder() {
    const res = await driveReq("GET", "/files", {
      q: `name='${FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false`,
      fields: "files(id)"
    });
    if (res.files?.length) return res.files[0].id;
    const f = await driveReq("POST", "/files", null, { name: FOLDER_NAME, mimeType: "application/vnd.google-apps.folder" });
    return f.id;
  }

  async function getEntriesFileId(fid) {
    const res = await driveReq("GET", "/files", {
      q: `name='${ENTRIES_FILE}' and '${fid}' in parents and trashed=false`,
      fields: "files(id)"
    });
    return res.files?.[0]?.id || null;
  }

  async function readEntries(eid) {
    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${eid}?alt=media`, {
      headers: { Authorization: "Bearer " + accessToken }
    });
    if (!res.ok) throw new Error("Kunne ikke lese fil");
    return res.json();
  }

  async function writeEntries(data) {
    const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
    const form = new FormData();
    if (fileId) {
      form.append("metadata", new Blob([JSON.stringify({})], { type: "application/json" }));
      form.append("file", blob);
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart`, {
        method: "PATCH", headers: { Authorization: "Bearer " + accessToken }, body: form
      });
    } else {
      form.append("metadata", new Blob([JSON.stringify({ name: ENTRIES_FILE, parents: [folderId] })], { type: "application/json" }));
      form.append("file", blob);
      const res = await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart", {
        method: "POST", headers: { Authorization: "Bearer " + accessToken }, body: form
      });
      const d = await res.json();
      fileId = d.id;
      // Make writable by anyone
      await driveReq("POST", `/files/${fileId}/permissions`, null, { role: "writer", type: "anyone" });
    }
  }

  // ---- LOAD DATA ----
  async function loadDriveData(silent = false) {
    if (!silent) setSyncing(true, "Laster...");
    try {
      folderId = folderId || await getOrCreateFolder();
      fileId = fileId || await getEntriesFileId(folderId);
      if (fileId) {
        const data = await readEntries(fileId);
        entries = Array.isArray(data) ? data : [];
      } else {
        entries = [];
      }
      renderEntries();
      const t = new Date().toLocaleTimeString("nb-NO", { hour: "2-digit", minute: "2-digit" });
      setSyncing(false, `Sist synkronisert ${t}`);
    } catch (e) {
      setSyncing(false, "Synkronisering feilet");
      if (!silent) {
        const el = document.getElementById("app-error");
        el.textContent = "⚠️ Kunne ikke laste dagboken: " + e.message;
        el.style.display = "block";
      }
    }
  }

  // ---- PHOTOS ----
  async function handlePhotos(input) {
    const files = Array.from(input.files);
    const dataUrls = await Promise.all(files.map(f => new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = e => res(e.target.result);
      r.onerror = rej;
      r.readAsDataURL(f);
    })));
    const resized = await Promise.all(dataUrls.map(d => resizeImage(d)));
    pendingPhotos = [...pendingPhotos, ...resized].slice(0, 6);
    input.value = "";
    renderPhotoPreviews();
  }

  function renderPhotoPreviews() {
    const el = document.getElementById("photo-previews");
    const cnt = document.getElementById("photo-count");
    cnt.textContent = pendingPhotos.length;
    cnt.style.display = pendingPhotos.length ? "inline" : "none";
    el.innerHTML = pendingPhotos.map((src, i) => `
      <div class="photo-thumb-wrap">
        <img src="${src}" class="photo-thumb" />
        <button class="photo-remove" onclick="removePhoto(${i})">×</button>
      </div>
    `).join("");
  }

  function removePhoto(i) {
    pendingPhotos.splice(i, 1);
    renderPhotoPreviews();
  }

  // ---- SUBMIT ----
  async function handleSubmit() {
    const ta = document.getElementById("entry-textarea");
    const text = ta.value.trim();
    if (!text) return;
    const btn = document.getElementById("submit-btn");
    btn.disabled = true;
    btn.textContent = "Lagrer...";

    const newEntry = {
      id: Date.now().toString(),
      author: userName,
      text,
      photos: [...pendingPhotos],
      date: new Date().toISOString()
    };
    const updated = [newEntry, ...entries];
    try {
      await writeEntries(updated);
      entries = updated;
      ta.value = "";
      pendingPhotos = [];
      renderPhotoPreviews();
      renderEntries();
      showToast("Innlegg lagret på Drive! 📖");
    } catch (e) {
      showToast("Feil ved lagring: " + e.message);
    }
    btn.disabled = false;
    btn.textContent = "Skriv inn ✦";
  }

  // ---- DELETE ----
  async function deleteEntry(id) {
    if (!confirm("Slette dette innlegget?")) return;
    const updated = entries.filter(e => e.id !== id);
    try {
      await writeEntries(updated);
      entries = updated;
      renderEntries();
      showToast("Innlegg slettet.");
    } catch { showToast("Feil ved sletting."); }
  }

  // ---- RENDER ----
  function renderEntries() {
    const el = document.getElementById("entries-list");
    if (entries.length === 0) {
      el.innerHTML = `<div class="empty-state"><span class="empty-icon">📖</span>Ingen innlegg ennå. Skriv det første!</div>`;
      return;
    }
    el.innerHTML = entries.map(e => `
      <div class="entry-card">
        <button class="entry-delete" onclick="deleteEntry('${e.id}')">✕</button>
        <div class="entry-body">
          <div class="entry-meta">
            <span class="entry-author-badge">✍️ ${e.author}</span>
            <span class="entry-date">${formatDate(e.date)}</span>
          </div>
          <div class="entry-text">${e.text.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div>
        </div>
        ${e.photos?.length ? `<div class="entry-photos">${e.photos.map(src => `<img src="${src}" class="entry-photo" onclick="openLightbox('${src}')" />`).join("")}</div>` : ""}
      </div>
    `).join("");
  }

  // ---- LIGHTBOX ----
  function openLightbox(src) {
    document.getElementById("lightbox-img").src = src;
    document.getElementById("lightbox").classList.add("active");
  }
  function closeLightbox() {
    document.getElementById("lightbox").classList.remove("active");
    document.getElementById("lightbox-img").src = "";
  }
</script>
</body>
</html>
